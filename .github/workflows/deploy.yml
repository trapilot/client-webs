name: Deploy HQT Elevator

on:
  push:
    branches:
      - hqt_elevator

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show environment (debug)
        run: |
          echo "Running on self-hosted runner"
          whoami
          hostname
          pwd

      - name: Deploy application
        run: |
          set -e
          echo "=== START DEPLOY ==="
          bash /app/web/1.hqt_elevator/deploy.sh
          echo "=== DONE ==="