name: Deploy HQT Elevator

on:
  push:
    branches:
      - hqt_elevator

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check runner network (debug)
        run: |
          echo "Runner public IP:"
          curl -s ifconfig.me
          echo ""
          echo "Testing SSH port..."
          echo ${{ secrets.VPS_HOST }}
          echo ${{ secrets.VPS_PORT }}
          nc -vz ${{ secrets.VPS_HOST }} ${{ secrets.VPS_PORT }} || true

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -e
            echo "=== START DEPLOY ==="
            bash /app/web/1.hqt_elevator/deploy.sh
            echo "=== DONE ==="