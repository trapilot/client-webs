
{% load url_cms %}

<section class="gradient-red text-white py-16">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-2 gap-12 items-center">
            <div>
                <h2 class="text-3xl font-bold mb-2">{{ title }}</h2>
                <p class="text-lg opacity-90">{{ description }}</p>
            </div>
            <div class="flex gap-4">
                <a class="bg-white text-red-elevator px-8 py-3 rounded font-bold hover:shadow-lg transition flex items-center gap-2" href="tel:{{ project.phone|cut:' ' }}">
                    <button>
                        <i class="fas fa-phone"></i> {{ project.phone }}
                    </button>
                </a>
                <a class="border-2 border-white text-white px-8 py-3 rounded font-bold hover:bg-white hover:text-black hover:text-red-elevator transition" href="{% url_cms 'contact' %}">
                    <button>
                        {{ button_text|default:"LIÊN HỆ NGAY" }}
                    </button>
                </a>
            </div>
        </div>
    </div>
</section>
