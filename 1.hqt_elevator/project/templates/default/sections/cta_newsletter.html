
{% load url_cms %}

<section class="gradient-red text-white py-16">
    <div class="container mx-auto px-4">
        <div class="max-w-2xl mx-auto text-center">
            <h2 class="text-3xl font-bold mb-2">{{ title }}</h2>
            <p class="mb-6 opacity-90">{{ description }}</p>
            <div class="flex gap-2">
                <input type="email" placeholder="Nhập email của bạn..." 
                        class="flex-1 px-4 py-3 rounded text-gray-900 focus:outline-none">
                <button class="bg-white text-red-elevator px-8 py-3 rounded font-bold hover:shadow-lg transition">
                    {{ button_text|default:"Đăng Ký" }}
                </button>
            </div>
        </div>
    </div>
</section>
