{% if not page.is_home and page.h1|length %}
<section class="bg-gradient-to-r from-gray-800 to-gray-900 text-white py-16">
    <div class="container mx-auto px-4">
        <h1 class="text-4xl font-bold mb-4">{{ page.h1 }}</h1>
        {% if page.h2|length %}
        <p class="text-lg opacity-90">{{ page.h2 }}</p>
        {% endif %}
    </div>
</section>
{% endif %}
