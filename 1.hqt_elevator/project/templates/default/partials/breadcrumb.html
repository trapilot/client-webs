{% load url_cms %}

{% if not page.is_home %}
<div class="bg-gray-100 py-3 border-b border-gray-200">
    <div class="max-w-[1200px] mx-auto px-4 flex text-[13px] font-medium text-gray-800 capitalize">
        <a href="{% url_cms site.page_home.code %}" class="hover:text-red-800 transition">{{ site.page_home.name }}</a><span class="mx-2">/</span>
        {% if page.parent and page.is_internal %}
        <a href="{% url_cms page.parent.code %}" class="hover:text-red-800 transition">{{ page.parent.name }}</a>
        <span class="mx-2">/</span> 
        {% endif %}
        {% if landing %}
        <span class="text-gray-900 font-bold">{{ landing.title }}</span>
        {% elif object %}
        <span class="text-gray-900 font-bold">{{ object.name }}</span>
        {% else %}
        <span class="text-gray-900 font-bold">{{ page.name }}</span>
        {% endif %}
    </div>
</div>
{% endif %}
