{% load url_cms thumbnail %}

<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-[1200px] mx-auto px-4">
    <div class="flex justify-between items-center h-[72px]">
      <a href="/" class="flex items-center gap-2">
        {% if project.imageLogo|length %}
        <div class="text-red-600">
            {% thumbnail project.imageLogo "100x40" crop="center" as im %}
            <img src="{{ im.url }}" width="{{ im.width }}" height="{{ im.height }}" alt="{{ project.name }}" class="shadow-lg">
            {% endthumbnail %}
        </div>
        {% else %}
        <svg class="w-8 h-8 text-red-700" fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h4v16H4V4zm6 0h4v16h-4V4zm6 0h4v16h-4V4z"/></svg>
        <div class="leading-tight">
          <div class="text-xl font-black text-gray-900 tracking-tighter">HQT</div>
          <div class="text-[10px] font-bold text-gray-500 tracking-widest">ELEVATOR</div>
        </div>
        {% endif %}
      </a>
      
      <nav class="hidden lg:flex space-x-7 text-[14px] font-bold text-gray-700 uppercase tracking-tight">
        {% for p in project.navigation_primary %}
          <a href="{% url_cms p.code %}" class="hover:text-red-700 transition pb-1{% if page.code == p.code %} border-b-2{% endif %}">{{ p.name }}</a>
        {% endfor %}
      </nav>

      <a href="tel:{{ project.phone|cut:' ' }}" class="bg-red-700 text-white px-5 py-2 rounded-md font-bold text-sm hover:bg-red-800 transition flex items-center shadow-md">
        <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
        {{ project.phone }}
      </a>
    </div>
  </div>
</header>
